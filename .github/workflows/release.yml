name: Release

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_sha: ${{ steps.meta.outputs.release_sha }}
      archive_name: ${{ steps.meta.outputs.archive_name }}
      archive_sha256: ${{ steps.meta.outputs.archive_sha256 }}
      has_tap_token: ${{ steps.tap-token.outputs.has_tap_token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          bump_patch() {
            local major minor patch
            IFS=. read -r major minor patch <<<"$1"
            [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]] || {
              echo "VERSION must be MAJOR.MINOR.PATCH" >&2
              exit 1
            }
            printf '%s.%s.%s\n' "$major" "$minor" "$((patch + 1))"
          }

          version="$(cat VERSION)"
          while git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; do
            version="$(bump_patch "$version")"
          done

          if [[ "$(cat VERSION)" != "$version" ]]; then
            printf '%s\n' "$version" > VERSION
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- VERSION; then
            git add VERSION
            git commit -m "chore: prepare release v${version}"
            git push origin HEAD:main
          fi

          tag="v${version}"

          release_sha="$(git rev-parse HEAD)"
          archive_name="restart-to-linux-${version}.tar.gz"
          git archive --format=tar.gz --prefix="restart-to-linux-${version}/" "$release_sha" > "$archive_name"
          archive_sha256="$(sha256sum "$archive_name" | awk '{print $1}')"

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "release_sha=$release_sha"
            echo "archive_name=$archive_name"
            echo "archive_sha256=$archive_sha256"
          } >>"$GITHUB_OUTPUT"

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: ${{ steps.meta.outputs.archive_name }}

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.release_sha }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Check tap token
        id: tap-token
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ -n "$TAP_GITHUB_TOKEN" ]]; then
            echo "has_tap_token=true" >>"$GITHUB_OUTPUT"
          else
            echo "has_tap_token=false" >>"$GITHUB_OUTPUT"
          fi

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - uses: actions/download-artifact@v4
        with:
          name: source-archive
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cat >release-notes.txt <<'EOF'
          Assets:

          - source tarball
          EOF

          gh release create "${{ needs.prepare.outputs.tag }}" \
            "release-assets/${{ needs.prepare.outputs.archive_name }}" \
            --title "restart-to-linux ${{ needs.prepare.outputs.tag }}" \
            --notes-file release-notes.txt

  update-homebrew-tap:
    runs-on: ubuntu-latest
    if: ${{ needs.prepare.outputs.has_tap_token == 'true' }}
    needs:
      - prepare
      - publish-release
    env:
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Check out tap repo
        uses: actions/checkout@v4
        with:
          repository: jtbrough/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Render formula
        run: |
          mkdir -p homebrew-tap/Formula
          packaging/brew/build.sh \
            "${{ needs.prepare.outputs.version }}" \
            "${{ needs.prepare.outputs.archive_sha256 }}" \
            > homebrew-tap/Formula/restart-to-linux.rb

      - name: Commit and push tap update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/restart-to-linux.rb
          if git diff --cached --quiet -- Formula/restart-to-linux.rb; then
            git commit --allow-empty -m "chore: sync restart-to-linux release ${{ needs.prepare.outputs.version }}"
          else
            git commit -m "feat: update restart-to-linux to ${{ needs.prepare.outputs.version }}"
          fi
          git push origin HEAD
